<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Highlight a row onclick</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <table class="myTable">
        <caption>Annual Regional Sales Report (2025)</caption>
        <thead>
            <tr>
                <th>Region</th>
                <th>Quarter</th>
                <th>Revenue</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="4">Bihar</td>
                <td>Q1</td>
                <td>10,000</td>
                <td>Below Met</td>
            </tr>
            <tr>
                <td>Q2</td>
                <td>20,000</td>
                <td>Above target</td>
            </tr>
            <tr>
                <td>Q3</td>
                <td>30,000</td>
                <td>Above target</td>
            </tr>
            <tr>
                <td>Q4</td>
                <td>50,000</td>
                <td>Above target</td>
            </tr>
        </tbody>
        <tbody>
            <tr>
                <td rowspan="4">Uttar Pradesh</td>
                <td>Q1</td>
                <td>30,000</td>
                <td>Below Target</td>
            </tr>
            <tr>
                <td>Q2</td>
                <td>40,000</td>
                <td>Target Met</td>
            </tr>
            <tr>
                <td>Q3</td>
                <td>20,000</td>
                <td>Above target</td>
            </tr>
            <tr>
                <td>Q4</td>
                <td>50,000</td>
                <td>Above target</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="2">Total Annual Revenue</th>
                <td colspan="2"><strong>2,50,000</strong></td>
            </tr>
        </tfoot>
    </table>
    <script src="script.js"></script>
</body>
</html>
